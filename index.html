<!DOCTYPE html>
<html>
<head>
	<title>Calcola la media di R3BU5</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	
	<meta name="description" content="Calcolatore di voti per raggiungere la media desiderata.">
    	<meta name="google-site-verification" content="+nxGUDJ4QpAZ5l9Bsjdi102tLVC21AIh5d1Nl23908vVuFHs34=">
    	<title>Example Books - high-quality used books for children</title>
    	<meta name="robots" content="index,follow">

	<link href="layout.css" rel="stylesheet">
</head>
<body>

	<h1>Calcola la media</h1>
	<div class="container">
		<p>Inserisci una serie di numeri separati da una virgola:</p>
		<input type="text" id="numbers">
		<button onclick="calculate()">Calcola</button>

		<p>La media dei numeri inseriti è:</p>
		<div id="result"></div>

    	<p>Per arrivare a 6 mancano:</p>
		<div id="quanti"></div>
		<p id="oppure"></p>
		<div id="quanti2"></div>

		<div id="quanti3"></div>
	</div>
	<script>
		function calculate() {
			var input = document.getElementById("numbers").value;
			var numbers = input.split(",");
			var sum = 0;
			for (var i = 0; i < numbers.length; i++) {
				sum += parseFloat(numbers[i]);
			}
			var average = sum / numbers.length;
			document.getElementById("result").innerHTML = average.toFixed(2);

			if(average >= 6){
				/*inizializzo div vuoti*/	
				document.getElementById("quanti").innerHTML = "Non servono altri voti";

				document.getElementById("quanti2").innerHTML = "";

				document.getElementById("quanti3").innerHTML = "";

				document.getElementById("oppure").innerHTML = "";
			}else{
				document.getElementById("oppure").innerHTML = "Oppure";
				/*calcolo 1° quantità (i) x voti (serve)*/	
				var i = 1;
				var serve = (6*(numbers.length+i)-sum)/i;
				while(serve > 10){
					i +=1;
					var serve = (6*(numbers.length+i)-sum)/i;
				}
				/*calcolo 2° quantità (i) x voti (serve)*/	
				var serve2 = (6*(numbers.length+1+i)-sum)/1+i;
				var j = i;
				while(serve2 > 10){
						j +=1;
						var serve2 = (6*(numbers.length+j)-sum)/j;
					}
				/*calcolo 3° quantità (i) x voti (serve)*/	
				var serve3 = (6*(numbers.length+2+i)-sum)/2+i;
				var k = j;
				while(serve3 > 10){
						k +=1;
						var serve3 = (6*(numbers.length+k)-sum)/k;
					}
				/*stampa 1° quantità x voti*/	
				document.getElementById("quanti").innerHTML = i.toFixed(0) + " volte " + serve.toFixed(2);
				/*stampa 2° quantità x voti*/	
				document.getElementById("quanti2").innerHTML = j.toFixed(0) + " volte " + serve2.toFixed(2);
				/*stampa 3° quantità x voti*/	
				document.getElementById("quanti3").innerHTML = k.toFixed(0) + " volte " + serve3.toFixed(2);
 
			}  
		}
	</script>

</body>
</html>
