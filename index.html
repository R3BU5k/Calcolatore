<head>

    <link rel="canonical" href="https://r3bu5k.github.io/Calcolatore/" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Benvenuto! Questa web app ti permette di calcolare i valori mancanti necessari per raggiungere la media desiderata in modo semplice e veloce.">

    <title>Calcola la media di R3BU5</title>
    <meta name="robots" content="index,follow">

    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" href="images/logo.ico" type="image/x-icon" sizes="180x180"/>
    <link rel="shortcut icon" href="images/calc.ico" type="image/x-icon"/>
    <link rel="mask-icon" href="icons/safari-pinned-tab.svg" color="#5bbad5">

    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="icons/browserconfig.xml">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" id="theme-style" href="styles/light.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Sofia|Trirong|Itim">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00FF15" id="meta-theme-color" />
    <script src="https://platform-api.sharethis.com/js/sharethis.js#property=64b57269cf4bea0012ddd6ce&product=inline-share-buttons" async></script>
</head>
<body>
    <input type="button" id="theme-toggle">
    <h1 class="colore">Calcola la media</h1>
    
    <div id="cookie-banner" class="cookie-banner">
        <p>Questo sito utilizza i cookie per garantire un'esperienza utente migliore. Accetti l'uso dei cookie?</p>
        <button id="accept-cookies">Accetta</button>
    </div>

    <div class="container coloreBordo">
        <div class="config-grid">
            <div class="input-group">
                <label for="media">Media obiettivo:</label>
                <input type="text" class="coloreBordo input-styled" id="media" placeholder="5.5" tabindex="1" />
            </div>
            <div class="input-group">
                <label for="vmax">Voto max ottenibile:</label>
                <input type="text" class="coloreBordo input-styled" id="vmax" placeholder="10" tabindex="2" />
            </div>
        </div>

        <p class="section-title">Valori inseriti finora:</p>
        <div class="valori-container">
            <div class="valori">
                <div class="input-wrapper">
                    <input type="text" class="coloreBordo input-styled numbers" placeholder="voto" tabindex="3" />
                </div>
            </div>
            <button id="add-input-btn" class="add-button" title="Aggiungi campo">+</button>
        </div>

        <button id="button" class="coloreBordo btn-bgcolor main-calc-btn">Calcola la media</button>

        <div class="results-box">
            <p id="testo1"></p>
            <div id="result"></div>
            <p id="testo2"></p>
            <div id="quanti"></div>
            <p id="errore"></p>
        </div>
    </div>

    <details class="coloreBordo">
        <summary>Stili</summary>
        <table>
            <thead>
                <tr><th>Elemento</th><th>Valore</th><th>Elimina</th></tr>
            </thead>
            <tbody>
                <tr><td>Tema</td><td><input type="color" id="coloreInput" value="#00ff00"></td><td class="delete-cookie" data-cookie="colorePreferito"></td></tr>
                <tr><td>Bordi</td><td><input type="color" id="coloreBordi"></td><td class="delete-cookie" data-cookie="colorePreferitoBordi"></td></tr>
                <tr><td>Bottoni Ctr</td><td><input type="color" id="coloreBackgroundBottoni"></td><td class="delete-cookie" data-cookie="colorePreferitoBackgroundBottoni"></td></tr>
                <tr><td>Bottoni Txt</td><td><input type="color" id="coloreTestoBottoni"></td><td class="delete-cookie" data-cookie="colorePreferitoTestoBottoni"></td></tr>
            </tbody>
        </table>
        <br>
        <button class="btn-bgcolor" id="reload-page">Ricarica pagina</button>
        <br><br>
    </details>

    <div class="sharethis-inline-share-buttons" id="sharethis-inline-share-buttons"></div>
    <a href='https://t.me/CalcolatoreVoti' target="_blank" class="telegram-link">Resta Aggiornato</a>

    <script type="module" src="js/app.js"></script>
</body>
</html>
